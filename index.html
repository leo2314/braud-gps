<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Braud SB35 — Guidage de vendange</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet-Geoman : dessin des parcelles (polygones) directement sur la carte -->
<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<!-- Firebase (SDK "compat", v9) : App + Realtime Database -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  /* ============================================================
     1. JETONS DE DESIGN — palette "nuit de vendange"
     ============================================================ */
  :root{
    --bg-deep:      #0B130F;   /* fond général, quasi noir teinté vert sapin */
    --surface:      #131F19;   /* panneaux, bandeau */
    --surface-2:    #1B2A22;   /* éléments surélevés (inputs, cartes) */
    --border:       #2A3B30;
    --text:         #EAEFE9;
    --text-dim:     #8FA398;
    --accent-green: #5FD16B;   /* statut RTK Fix / éléments de progression */
    --accent-green-soft: rgba(95,209,107,0.18);
    --accent-red:   #E5484D;   /* peinture OFF */
    --accent-red-soft: rgba(229,72,77,0.18);
    --accent-amber: #E0A93A;   /* statut RTK Float */
    --accent-gray:  #6B7670;   /* statut simulation */
    --accent-jaune: #E0C341;   /* contour des parcelles */
    --font-ui:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono:    "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg-deep); color:var(--text);
    font-family:var(--font-ui); overflow:hidden; user-select:none; }

  #carte{ position:absolute; inset:0; z-index:0; background:var(--bg-deep); }

  .leaflet-control-attribution{ background:rgba(11,19,15,0.6)!important; color:var(--text-dim)!important; font-size:10px; }
  .leaflet-control-attribution a{ color:var(--text-dim)!important; }
  .leaflet-control-layers{ background:var(--surface)!important; color:var(--text)!important; border:1px solid var(--border)!important; }
  .leaflet-control-zoom{ display:none; }

  /* Surcharges minimales pour intégrer la barre d'outils Leaflet-Geoman au thème sombre.
     On ne réécrit pas toute la librairie : juste assez pour qu'elle ne jure pas avec l'UI. */
  .leaflet-pm-toolbar{ margin-top:70px !important; } /* sous le bandeau supérieur */
  .leaflet-pm-toolbar .leaflet-buttons-control-button{
    background:var(--surface-2) !important; border:1px solid var(--border) !important; border-radius:8px !important;
  }
  .leaflet-pm-toolbar .leaflet-buttons-control-button:hover{ background:var(--accent-green-soft) !important; }
  .leaflet-pm-actions-container{ background:var(--surface) !important; border:1px solid var(--border) !important; }
  .leaflet-pm-actions-container a{ color:var(--text) !important; }

  /* ============================================================
     2. BANDEAU SUPÉRIEUR — instruments de bord
     ============================================================ */
  #bandeau{
    position:absolute; top:0; left:0; right:0; z-index:500;
    display:flex; align-items:stretch; gap:0;
    background:linear-gradient(180deg, rgba(11,19,15,0.97), rgba(11,19,15,0.85));
    border-bottom:1px solid var(--border);
    padding:env(safe-area-inset-top,0) 0 0 0;
    backdrop-filter:blur(6px);
  }
  .instrument{
    flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:10px 16px; border-right:1px solid var(--border); min-width:0;
  }
  .instrument:last-child{ border-right:none; }
  .instrument-label{ font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); }
  .instrument-valeur{ font-family:var(--font-mono); font-size:clamp(18px,3.4vw,26px); font-weight:600; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #badge-mode .instrument-valeur{ font-family:var(--font-ui); font-size:clamp(14px,2.6vw,18px); }
  .puce-statut{ display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; vertical-align:middle; }
  .puce-statut.fix{ background:var(--accent-green); box-shadow:0 0 8px var(--accent-green); animation:pulse 2s infinite; }
  .puce-statut.float{ background:var(--accent-amber); box-shadow:0 0 8px var(--accent-amber); }
  .puce-statut.simu{ background:var(--accent-gray); }
  .puce-statut.deco{ background:var(--accent-red); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.45;} }

  /* ============================================================
     3. PANNEAUX LATÉRAUX — ⚙️ Paramètres (technique) ET 🗺️ Parcelles (gestion)
     ============================================================ */
  .panneau-lateral{
    position:absolute; top:0; right:0; bottom:0; z-index:600;
    width:min(86vw, 360px);
    background:var(--surface);
    border-left:1px solid var(--border);
    transform:translateX(100%);
    transition:transform 0.28s ease;
    overflow-y:auto;
    padding:18px 18px calc(env(safe-area-inset-bottom,0) + 18px) 18px;
  }
  .panneau-lateral.ouvert{ transform:translateX(0); }
  #voile{
    position:absolute; inset:0; z-index:550; background:rgba(0,0,0,0.45);
    opacity:0; pointer-events:none; transition:opacity 0.25s ease;
  }
  #voile.visible{ opacity:1; pointer-events:auto; }

  .panneau-titre{ font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim);
    margin:22px 0 10px; padding-top:14px; border-top:1px solid var(--border); }
  .panneau-titre:first-child{ margin-top:0; padding-top:0; border-top:none; }

  .champ{ margin-bottom:14px; }
  .champ label{ display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; }
  .champ input[type="number"], .champ input[type="text"]{
    width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:var(--font-mono); font-size:18px; padding:12px 14px;
  }
  .champ input:focus{ outline:2px solid var(--accent-green); outline-offset:1px; }

  .segmente{ display:flex; gap:8px; }
  .segmente button{
    flex:1; padding:14px 8px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-size:15px; font-weight:600; cursor:pointer;
  }
  .segmente button.actif{ background:var(--accent-green-soft); border-color:var(--accent-green); color:var(--accent-green); }

  .bouton-secondaire{
    width:100%; padding:14px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-size:15px; font-weight:600; cursor:pointer; margin-top:6px;
  }
  .bouton-secondaire.alerte{ border-color:var(--accent-red); color:var(--accent-red); }

  /* Liste des parcelles et de leur avancement (visible Chauffeur ET Cave) */
  #liste-parcelles{ display:flex; flex-direction:column; gap:10px; }
  .parcelle-vide{ color:var(--text-dim); font-size:13px; margin:0; }
  .ligne-parcelle{ background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .ligne-parcelle-entete{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .ligne-parcelle-nom{ font-size:14px; font-weight:600; }
  .ligne-parcelle-pct{ font-family:var(--font-mono); font-size:15px; font-weight:700; flex:0 0 auto; }
  .ligne-parcelle-barre{ height:5px; border-radius:4px; background:var(--border); margin-top:8px; overflow:hidden; }
  .ligne-parcelle-remplissage{ height:100%; background:var(--accent-green); transition:width 0.4s ease; }
  .ligne-parcelle-surface{ margin-top:6px; font-size:12px; color:var(--text-dim); }
  .ligne-parcelle-actions{ display:flex; gap:8px; margin-top:10px; }
  .btn-editer-cepage, .btn-effacer-parcelle{
    flex:1; padding:8px 6px; font-size:12px; font-weight:600; border-radius:8px; cursor:pointer;
  }
  .btn-editer-cepage{ background:rgba(0,84,166,0.18); border:1px solid #0054A6; color:#5BA3E0; }
  .btn-effacer-parcelle{ background:var(--accent-red-soft); border:1px solid var(--accent-red); color:var(--accent-red); }

  /* Boutons du bandeau (⚙️ Paramètres / 🗺️ Parcelles) */
  .bouton-bandeau{
    flex:0 0 auto; width:56px; display:flex; align-items:center; justify-content:center;
    border-left:1px solid var(--border); background:transparent; color:var(--text);
    font-size:22px; cursor:pointer;
  }

  /* ============================================================
     4. COMMANDES DE SIMULATION (mode démo bureau)
     ============================================================ */
  #simulation{
    position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom,0) + 18px);
    transform:translateX(-50%); z-index:500;
    display:flex; gap:10px; align-items:center;
    background:rgba(19,31,25,0.92); border:1px solid var(--border); border-radius:16px;
    padding:10px 14px; backdrop-filter:blur(6px);
  }
  #simulation button{
    width:50px; height:50px; border-radius:12px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-size:20px; cursor:pointer;
  }
  #simulation button#sim-marche{ width:auto; padding:0 16px; font-size:14px; font-weight:700; letter-spacing:0.04em; }
  #simulation button#sim-marche.actif{ background:var(--accent-green-soft); border-color:var(--accent-green); color:var(--accent-green); }

  /* ============================================================
     5. GROS BOUTON PEINTURE
     ============================================================ */
  #bouton-peinture{
    position:absolute; right:18px; bottom:calc(env(safe-area-inset-bottom,0) + 18px); z-index:500;
    width:clamp(108px,22vw,140px); height:clamp(108px,22vw,140px);
    border-radius:24px; border:2px solid var(--accent-red);
    background:var(--accent-red-soft); color:var(--accent-red);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    font-family:var(--font-ui); font-weight:800; font-size:15px; letter-spacing:0.04em;
    cursor:pointer; transition:background 0.15s, border-color 0.15s, color 0.15s;
    box-shadow:0 6px 24px rgba(0,0,0,0.4);
  }
  #bouton-peinture.actif{
    border-color:#0054A6; background:rgba(0,84,166,0.18); color:#0054A6;
  }
  #bouton-peinture.attente{
    border-color:var(--accent-amber); background:rgba(224,169,58,0.18); color:var(--accent-amber);
  }
  #bouton-peinture .icone-pinceau{ font-size:30px; }

  /* ============================================================
     6. ICÔNE DE LA MACHINE SUR LA CARTE
     ============================================================ */
  .icone-machine{ width:46px; height:46px; transform-origin:50% 50%; pointer-events:none; }
  .icone-machine svg{ width:100%; height:100%; display:block; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }

  /* ============================================================
     6bis. ÉTIQUETTE DYNAMIQUE DES PARCELLES (nom | cépage | surface | %)
     ============================================================ */
  .leaflet-tooltip.label-parcelle-dynamique{
    background:rgba(11,19,15,0.85);
    border:1px solid #0054A6;
    color:#FFFFFF;
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.01em;
    padding:5px 10px;
    border-radius:7px;
    box-shadow:0 2px 6px rgba(0,0,0,0.6);
    text-shadow:0 1px 2px rgba(0,0,0,0.85);
    white-space:nowrap;
    pointer-events:none;
  }
  .leaflet-tooltip.label-parcelle-dynamique::before{ display:none; } /* pas de petite flèche en direction 'center' */

  /* ============================================================
     6ter. MODALE DE CRÉATION / ÉDITION DE PARCELLE (nom + cépage)
     ============================================================ */
  #modale-parcelle{
    position:fixed; inset:0; z-index:700;
    background:rgba(0,0,0,0.65); display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  #modale-parcelle.visible{ display:flex; }
  #modale-parcelle-contenu{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:24px; max-width:420px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.6);
  }
  #modale-parcelle h3{ margin:0 0 18px; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
  #modale-parcelle .champ{ margin-bottom:14px; }
  #modale-parcelle .champ label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  #modale-parcelle input{
    width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-size:15px; padding:11px 12px; font-family:var(--font-ui);
  }
  #modale-parcelle input:focus{ outline:2px solid #0054A6; outline-offset:1px; }
  #modale-parcelle .bouton-groupe{ display:flex; gap:10px; margin-top:20px; }
  #modale-parcelle button{ flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); font-weight:600; font-size:14px; cursor:pointer; }
  #modale-parcelle .btn-confirmer{ background:#0054A6; color:#FFF; border-color:#0054A6; }
  #modale-parcelle .btn-annuler{ background:var(--surface-2); color:var(--text); }

  .ligne-parcelle-nom{ flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* ============================================================
     7. MODE CAVE — masque les commandes réservées au chauffeur
     ============================================================ */
  body.mode-cave .seulement-chauffeur{ display:none !important; }

  @media (max-width:480px){
    .instrument-label{ font-size:9.5px; }
    .instrument{ padding:8px 10px; }
  }
</style>
</head>
<body>

<div id="carte"></div>

<div id="bandeau">
  <div class="instrument" id="badge-mode">
    <span class="instrument-label">Mode</span>
    <span class="instrument-valeur" id="texte-mode">—</span>
  </div>
  <div class="instrument">
    <span class="instrument-label">Statut GPS</span>
    <span class="instrument-valeur"><span id="puce-statut" class="puce-statut simu"></span><span id="texte-statut">Simulation</span></span>
  </div>
  <div class="instrument">
    <span class="instrument-label">Vitesse</span>
    <span class="instrument-valeur"><span id="valeur-vitesse">0.0</span> km/h</span>
  </div>
  <div class="instrument">
    <span class="instrument-label">Cap</span>
    <span class="instrument-valeur"><span id="valeur-cap">0</span>°</span>
  </div>
  <button id="bouton-panneau-parcelles" class="bouton-bandeau" aria-label="Parcelles">🗺️</button>
  <button id="bouton-panneau" class="bouton-bandeau" aria-label="Réglages">⚙</button>
</div>

<div id="voile"></div>

<!-- PANNEAU 1/2 — Réglages techniques uniquement (Largeur, Offset, WebSocket, Recentrage) -->
<div id="panneau-parametres" class="panneau-lateral">

  <div class="seulement-chauffeur">
    <div class="panneau-titre">Tracé de peinture</div>
    <div class="champ">
      <label for="champ-largeur">Largeur de travail (m)</label>
      <input type="number" id="champ-largeur" min="0.1" step="0.1" value="2.50">
    </div>
    <div class="champ">
      <label for="champ-offset">Déport latéral (m)</label>
      <input type="number" id="champ-offset" min="0" step="0.1" value="1.20">
    </div>
    <div class="champ">
      <label>Côté du déport</label>
      <div class="segmente">
        <button id="cote-gauche" data-cote="gauche">◀ Gauche</button>
        <button id="cote-droite" data-cote="droite" class="actif">Droite ▶</button>
      </div>
    </div>

    <div class="panneau-titre">Connexion ESP32 / GNSS</div>
    <div class="champ">
      <label for="champ-ws">Adresse WebSocket de l'ESP32</label>
      <input type="text" id="champ-ws" value="ws://192.168.4.1:81">
    </div>
    <button class="bouton-secondaire" id="bouton-connexion">Se connecter</button>
  </div>

  <div class="panneau-titre">Suivi caméra</div>
  <div class="champ" style="margin-top:0;">
    <label style="margin-bottom:0;">Recentrer la caméra automatiquement</label>
    <div class="segmente">
      <button id="suivi-on" data-suivi="1" class="actif">Activé</button>
      <button id="suivi-off" data-suivi="0">Désactivé</button>
    </div>
  </div>

</div>

<!-- PANNEAU 2/2 — Gestion des parcelles : liste, cépage, et effacement ciblé de la peinture -->
<div id="panneau-parcelles" class="panneau-lateral">

  <div class="panneau-titre">Parcelles &amp; avancement</div>
  <p style="font-size:12px; color:var(--text-dim); margin:-4px 0 12px;" class="seulement-chauffeur">
    Dessinez un polygone avec l'outil ✏️ en haut à gauche de la carte pour créer une parcelle.
  </p>
  <div id="liste-parcelles"><p class="parcelle-vide">Aucune parcelle tracée pour le moment.</p></div>

</div>

<!-- Modale de création/édition d'une parcelle (Nom + Cépage), remplace les prompt() -->
<div id="modale-parcelle">
  <div id="modale-parcelle-contenu">
    <h3 id="modale-titre">Nouvelle parcelle</h3>
    <div class="champ">
      <label for="modale-nom">Nom de la parcelle</label>
      <input type="text" id="modale-nom" placeholder="ex : Les Vignes Rouges" maxlength="50">
    </div>
    <div class="champ">
      <label for="modale-cepage">Cépage</label>
      <input type="text" id="modale-cepage" placeholder="ex : Merlot, Cabernet Sauvignon…" maxlength="40">
    </div>
    <div class="bouton-groupe">
      <button class="btn-annuler" id="modale-annuler">Annuler</button>
      <button class="btn-confirmer" id="modale-confirmer">Valider</button>
    </div>
  </div>
</div>

<div id="simulation" class="seulement-chauffeur">
  <button id="sim-gauche" aria-label="Tourner à gauche">↺</button>
  <button id="sim-marche">▶ AUTO</button>
  <button id="sim-droite" aria-label="Tourner à droite">↻</button>
  <button id="sim-avance" aria-label="Avancer d'un pas">⤒</button>
</div>

<button id="bouton-peinture" class="seulement-chauffeur">
  <span class="icone-pinceau">🖌</span>
  <span id="texte-peinture">PEINTURE : OFF</span>
</button>

<script>
/* ================================================================
   0. CONFIGURATION FIREBASE — collez vos propres clés ici
   ================================================================
   Console Firebase > Paramètres du projet > Vos applications > SDK (config)
*/
const firebaseConfig = {
  apiKey: "AIzaSyCywa_Qs_1DUo74m0sN6k39tKdK6h08HHs",
  authDomain: "braud-sb35-gps.firebaseapp.com",
  databaseURL: "https://braud-sb35-gps-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "braud-sb35-gps",
  storageBucket: "braud-sb35-gps.firebasestorage.app",
  messagingSenderId: "687241751580",
  appId: "1:687241751580:web:d6f137d073890a96d683d9"
};


let firebaseActif = false;
let db;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  firebaseActif = true;
}catch(erreur){
  console.error('Firebase non initialisé — complétez firebaseConfig ci-dessus :', erreur);
}

// Références utilisées dans toute l'application (créées seulement si Firebase a démarré)
let dbMachinePosition, dbMachineConfig, dbParcelles, dbRecolteTraces;
if (firebaseActif){
  dbMachinePosition = db.ref('machine/position');
  dbMachineConfig   = db.ref('machine/config');
  dbParcelles       = db.ref('parcelles');
  dbRecolteTraces   = db.ref('recolte/traces');
}

/* ================================================================
   DÉTECTION DU MODE DE L'APPAREIL : Chauffeur (par défaut) ou Cave (?mode=cave)
   ================================================================ */
const parametresURL = new URLSearchParams(window.location.search);
const modeCave = parametresURL.get('mode') === 'cave';

/* ================================================================
   ÉTAT GLOBAL DE L'APPLICATION
   ================================================================ */
const etat = {
  modeCave,
  derniereLat: 47.12237054999479,
  derniereLon: -1.3570622967314048,
  dernierCap: 0,
  vitesseKmh: 0,
  peintureActive: false,
  source: modeCave ? 'DECONNECTE' : 'SIMULATION',
  suivreCamera: true,
  cote: 'droite',
  largeurM: 2.50,
  offsetM: 1.20,
  dernierePositionTemps: null,
  zoneRecolteTotale: null   // union GeoJSON (turf) de toute la surface déjà peinte
};

// Variables pour le lissage fluide (Interpolation 60 FPS) — alimentées en local OU depuis Firebase
const lissage = {
  latCible: 47.12237054999479,
  lonCible: -1.3570622967314048,
  capCible: 0,
  latAffichee: 47.12237054999479,
  lonAffichee: -1.3570622967314048,
  capAffiche: 0
};

let traceCourante = null;
let websocket = null;
let dernierEnvoiPosition = 0;
let derniereParcelleTrouveeCle = null;      // optimisation 10 Hz : on reteste d'abord la dernière parcelle connue
let dernierAffichageBoutonPeinture = null;  // 'actif' | 'attente' | null — évite des écritures DOM inutiles à 10 Hz
const tracesCreesLocalement = new Set(); // évite de redessiner nos propres tracés reçus en écho depuis Firebase
const tracesParClé = {};                  // cle (Firebase ou locale) -> { feature: Polygone turf, calque: calque Leaflet }
                                           // registre indispensable à l'effacement ciblé par parcelle (turf.difference)
const parcellesAffichees = {};            // cle Firebase -> { data, calque, etiquette, pourcentage, featureTurf, boite }
let modeCreationParcelle = false;         // true pendant la création d'une nouvelle parcelle, false en édition
let cleParcelleEnEdition = null;          // clé Firebase de la parcelle en cours d'édition (sinon null)
let geojsonEnCours = null;                // géométrie GeoJSON du polygone qui attend sa confirmation (Nom + Cépage)

/* ================================================================
   1. INITIALISATION DE LA CARTE LEAFLET
   ================================================================ */
const carte = L.map('carte', {
  zoomControl:false,
  attributionControl:true,
  tap:true
}).setView([etat.derniereLat, etat.derniereLon], 19);

const coucheSatellite = L.tileLayer(
  'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
  {
    maxZoom: 22,
    maxNativeZoom: 20,
    attribution: '© Google Maps'
  }
).addTo(carte);

const coucheOSM = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom:19, attribution:'© OpenStreetMap' }
);

L.control.layers({ 'Satellite': coucheSatellite, 'Plan (OSM)': coucheOSM }, {}, { position:'bottomleft' }).addTo(carte);

/* ================================================================
   2. ICÔNE DE LA MACHINE
   ================================================================ */
function svgMachine(){
  return `
    <svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
      <g>
        <polygon points="30,4 40,26 20,26" fill="#5FD16B" />
        <rect x="14" y="24" width="32" height="58" rx="10" fill="#131F19" stroke="#5FD16B" stroke-width="3"/>
        <rect x="2" y="40" width="56" height="14" rx="4" fill="#131F19" stroke="#5FD16B" stroke-width="2.5"/>
        <circle cx="30" cy="58" r="4" fill="#5FD16B"/>
      </g>
    </svg>`;
}

const iconeMachine = L.divIcon({
  className:'icone-machine',
  html: svgMachine(),
  iconSize:[46,46],
  iconAnchor:[23,23]
});

const marqueurMachine = L.marker([etat.derniereLat, etat.derniereLon], {
  icon: iconeMachine, interactive:false, keyboard:false
}).addTo(carte);

function orienterIcone(capDeg){
  const elt = marqueurMachine.getElement();
  if (elt) elt.style.transform += ` rotate(${capDeg}deg)`;
}

/* ================================================================
   3. MATHÉMATIQUES — point de destination
   ================================================================ */
const RAYON_TERRE = 6378137;

function normaliserCap(deg){
  return ((deg % 360) + 360) % 360;
}

function pointDestination(latDeg, lonDeg, capDeg, distanceM){
  const delta = distanceM / RAYON_TERRE;
  const theta = capDeg * Math.PI / 180;
  const phi1  = latDeg * Math.PI / 180;
  const lambda1 = lonDeg * Math.PI / 180;

  const phi2 = Math.asin(
    Math.sin(phi1) * Math.cos(delta) +
    Math.cos(phi1) * Math.sin(delta) * Math.cos(theta)
  );
  const lambda2 = lambda1 + Math.atan2(
    Math.sin(theta) * Math.sin(delta) * Math.cos(phi1),
    Math.cos(delta) - Math.sin(phi1) * Math.sin(phi2)
  );

  return {
    lat: phi2 * 180 / Math.PI,
    lon: (((lambda2 * 180 / Math.PI) + 540) % 360) - 180
  };
}

function calculerPinceau(latDeg, lonDeg, capDeg, cote, offsetM, largeurM){
  const capOffset = normaliserCap(cote === 'droite' ? capDeg + 90 : capDeg - 90);
  const centre = pointDestination(latDeg, lonDeg, capOffset, offsetM);

  const bordGauche = pointDestination(centre.lat, centre.lon, normaliserCap(capDeg - 90), largeurM / 2);
  const bordDroit  = pointDestination(centre.lat, centre.lon, normaliserCap(capDeg + 90), largeurM / 2);

  return { centre, bordGauche, bordDroit };
}

/* ================================================================
   4. GESTION DE LA PEINTURE
   ================================================================ */
function demarrerNouveauTrace(){
  traceCourante = {
    pointsGauche: [],
    pointsDroite: [],
    // fillRule:'nonzero' (au lieu du 'evenodd' par défaut du SVG) : l'intérieur du ruban reste
    // toujours rempli même quand le tracé se recroise lui-même (manœuvres, demi-tours, etc.)
    // Couleur "Bleu New Holland" (#0054A6)
    polygone: L.polygon([], {
      color:'#0054A6', weight:0, fillColor:'#0054A6', fillOpacity:0.55, fillRule:'nonzero'
    }).addTo(carte)
  };
}

// Test rapide et peu coûteux : le point est-il dans la boîte englobante de la parcelle ?
// (filtre avant le test géométrique précis, qui est plus cher à calculer à 10 Hz)
function dansBoite(lon, lat, boite){
  return lon >= boite[0] && lon <= boite[2] && lat >= boite[1] && lat <= boite[3];
}

// Recherche la parcelle (s'il y en a une) qui contient le point donné.
// Optimisation : on reteste d'abord la dernière parcelle trouvée, car la machine y reste
// statistiquement la plupart du temps — ça évite de scanner toute la liste à chaque trame GPS.
function trouverParcelleContenant(lat, lon){
  const point = turf.point([lon, lat]);

  if (derniereParcelleTrouveeCle){
    const p = parcellesAffichees[derniereParcelleTrouveeCle];
    if (p && dansBoite(lon, lat, p.boite) && turf.booleanPointInPolygon(point, p.featureTurf)){
      return derniereParcelleTrouveeCle;
    }
  }

  for (const cle of Object.keys(parcellesAffichees)){
    if (cle === derniereParcelleTrouveeCle) continue; // déjà testée ci-dessus
    const p = parcellesAffichees[cle];
    if (!dansBoite(lon, lat, p.boite)) continue;       // hors boîte englobante : on ne va pas plus loin
    if (turf.booleanPointInPolygon(point, p.featureTurf)){
      derniereParcelleTrouveeCle = cle;
      return cle;
    }
  }

  derniereParcelleTrouveeCle = null;
  return null;
}

// Met à jour l'apparence du gros bouton peinture selon que la machine est dans une parcelle ou non.
// N'écrit dans le DOM que si l'état affiché change réellement (encore une économie pour la boucle 10 Hz).
function majBoutonPeintureSelonZone(etatZone){
  if (!etat.peintureActive) return;
  if (etatZone === dernierAffichageBoutonPeinture) return;
  dernierAffichageBoutonPeinture = etatZone;

  const bouton = document.getElementById('bouton-peinture');
  bouton.classList.toggle('actif', etatZone === 'actif');
  bouton.classList.toggle('attente', etatZone === 'attente');
  document.getElementById('texte-peinture').textContent =
    etatZone === 'actif' ? 'PEINTURE : ON' : 'PEINTURE : EN ATTENTE (HORS ZONE)';
}

function ajouterPointPeinture(latDeg, lonDeg, capDeg){
  if (!etat.peintureActive) return;

  // calculerPinceau() donne à la fois le centre décalé (déport) et les deux bords (largeur de travail)
  const { centre, bordGauche, bordDroit } = calculerPinceau(
    latDeg, lonDeg, capDeg, etat.cote, etat.offsetM, etat.largeurM
  );

  // --- GEOFENCING : on teste la position réelle du pinceau (et non l'antenne GPS), puisque c'est
  //     elle qui représente l'endroit physiquement peint au sol, déport compris ---
  const dansUneParcelle = trouverParcelleContenant(centre.lat, centre.lon) !== null;

  if (!dansUneParcelle){
    // Hors de toute parcelle enregistrée : on gèle le tracé en cours (s'il existe) sans ajouter de point.
    // finaliserTrace() le clôt proprement (fusion dans la zone récoltée + synchro Firebase) plutôt que
    // de le laisser ouvert, pour ne jamais tirer un trait droit lors d'une ré-entrée ultérieure.
    if (traceCourante) finaliserTrace();
    majBoutonPeintureSelonZone('attente');
    return;
  }

  // De retour dans une parcelle : si le tracé avait été figé/clos, on en ouvre un tout nouveau ruban
  if (!traceCourante) demarrerNouveauTrace();
  majBoutonPeintureSelonZone('actif');

  traceCourante.pointsGauche.push([bordGauche.lat, bordGauche.lon]);
  traceCourante.pointsDroite.push([bordDroit.lat, bordDroit.lon]);

  const ruban = traceCourante.pointsGauche.concat(traceCourante.pointsDroite.slice().reverse());
  traceCourante.polygone.setLatLngs(ruban);
}

// Transforme le ruban [lat,lon] dessiné à l'écran en Polygone GeoJSON (turf), prêt pour union()/intersect()
function rubanVersGeoJSON(ruban){
  if (!ruban || ruban.length < 4) return null;
  const anneau = ruban.map(([lat, lon]) => [lon, lat]); // GeoJSON attend [lon, lat]
  anneau.push(anneau[0]); // un anneau GeoJSON doit être fermé (premier point = dernier point)
  try{ return turf.polygon([anneau]); }
  catch(erreur){ console.error('Anneau de tracé invalide, ignoré :', erreur); return null; }
}

// Fusionne un nouveau polygone de peinture dans la zone totale déjà récoltée, puis met à jour les % des parcelles
function fusionnerDansZoneRecolte(polygoneGeoJSON){
  try{
    etat.zoneRecolteTotale = etat.zoneRecolteTotale
      ? turf.union(etat.zoneRecolteTotale, polygoneGeoJSON)
      : polygoneGeoJSON;
    recalculerToutesParcelles();
  }catch(erreur){
    // Un tracé très tordu (virage très serré) peut produire une géométrie non simple : on l'ignore sans planter.
    console.error('Fusion de la zone récoltée impossible (tracé trop complexe) :', erreur);
  }
}

// Appelée à l'arrêt de la peinture (bouton OFF, ou sortie de parcelle) : clôt le tracé en cours.
// Le calque "live" (dessiné pendant la peinture) est retiré puis remplacé par un calque définitif,
// identique à celui que recevront tous les autres appareils — c'est ce calque qui est gardé en
// mémoire dans tracesParClé, pour pouvoir être découpé/retiré plus tard (effacement ciblé par parcelle).
function finaliserTrace(){
  if (!traceCourante){ return; }
  const calqueLive = traceCourante.polygone;
  const ruban = traceCourante.pointsGauche.concat(traceCourante.pointsDroite.slice().reverse());
  traceCourante = null;
  carte.removeLayer(calqueLive); // simple aperçu pendant le tracé ; la version définitive est créée ci-dessous

  const polygone = rubanVersGeoJSON(ruban);
  if (!polygone) return; // tracé trop court/invalide : rien à conserver

  if (etat.modeCave){
    // La Cave ne pousse jamais sur Firebase : elle attend l'événement child_added officiel
    // (poussé par le Chauffeur) pour redessiner et comptabiliser ce tracé avec la bonne clé.
    return;
  }

  fusionnerDansZoneRecolte(polygone);

  const styleTrace = { color:'#0054A6', weight:0, fillColor:'#0054A6', fillOpacity:0.55, fillRule:'nonzero' };

  if (firebaseActif){
    const reference = dbRecolteTraces.push();
    tracesCreesLocalement.add(reference.key);
    const calque = L.geoJSON(polygone, { style: styleTrace }).addTo(carte);
    tracesParClé[reference.key] = { feature: polygone, calque };
    reference.set({
      geojson: polygone.geometry,
      t: firebase.database.ServerValue.TIMESTAMP
    }).catch(erreur => console.error('Échec de la synchronisation du tracé vers Firebase :', erreur));
  } else {
    // Pas de Firebase configuré : le tracé reste local, sous une clé interne (non synchronisée)
    const cleLocale = 'local-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    const calque = L.geoJSON(polygone, { style: styleTrace }).addTo(carte);
    tracesParClé[cleLocale] = { feature: polygone, calque };
  }
}

function definirPeinture(active){
  etat.peintureActive = active;
  dernierAffichageBoutonPeinture = null; // force la prochaine trame GPS à redéterminer l'affichage exact
  const bouton = document.getElementById('bouton-peinture');
  bouton.classList.toggle('actif', active);
  bouton.classList.remove('attente');
  document.getElementById('texte-peinture').textContent = active ? 'PEINTURE : ON' : 'PEINTURE : OFF';
  if (active) demarrerNouveauTrace();
  else finaliserTrace();
}

document.getElementById('bouton-peinture').addEventListener('click', () => {
  definirPeinture(!etat.peintureActive);
});

/* ================================================================
   5. PARCELLES — dessin (Leaflet-Geoman), calcul de surface, synchro Firebase
   ================================================================ */
function echapperHTML(texte){
  const d = document.createElement('div');
  d.textContent = texte;
  return d.innerHTML;
}

function ajouterOuMajParcelle(cle, data){
  if (!data || !data.geojson) return;

  // On retire l'ancien rendu (contour + étiquette) avant de redessiner, utile en cas de child_changed
  if (parcellesAffichees[cle]){
    if (parcellesAffichees[cle].calque) carte.removeLayer(parcellesAffichees[cle].calque);
    if (parcellesAffichees[cle].etiquette) carte.removeLayer(parcellesAffichees[cle].etiquette);
  }

  const calque = L.geoJSON(data.geojson, {
    style:{ color:'#E0C341', weight:1.5, dashArray:'5,6', fill:false, fillOpacity:0, interactive:false }
  }).addTo(carte);

  let featureTurf, boite, centroid;
  try{
    featureTurf = turf.feature(data.geojson);
    boite = turf.bbox(featureTurf);             // [minLon, minLat, maxLon, maxLat] — filtre rapide du geofencing
    centroid = turf.centroid(featureTurf);       // centre approximatif, pour l'étiquette
  }catch(erreur){
    console.error('Parcelle "' + data.nom + '" ignorée (géométrie invalide) :', erreur);
    carte.removeLayer(calque);
    return;
  }

  // --- Étiquette dynamique (Nom | Cépage | Surface | %) : le texte est généré et tenu à jour
  //     par mettreAJourEtiquetteParcelle(), appelée une première fois ci-dessous, puis en boucle
  //     depuis recalculerToutesParcelles() — sans jamais recréer ce calque ---
  const centreLatLng = [centroid.geometry.coordinates[1], centroid.geometry.coordinates[0]];
  const etiquette = L.tooltip(centreLatLng, {
    permanent:true, direction:'center', className:'label-parcelle-dynamique', interactive:false
  }).setContent('…').addTo(carte);

  const pourcentagePrecedent = parcellesAffichees[cle] ? parcellesAffichees[cle].pourcentage : 0;
  parcellesAffichees[cle] = { data, calque, etiquette, pourcentage: pourcentagePrecedent, featureTurf, boite };

  mettreAJourEtiquetteParcelle(cle); // contenu initial de l'étiquette
  recalculerPourcentageParcelle(cle);
}

function supprimerParcelle(cle){
  if (parcellesAffichees[cle]){
    if (parcellesAffichees[cle].calque) carte.removeLayer(parcellesAffichees[cle].calque);
    if (parcellesAffichees[cle].etiquette) carte.removeLayer(parcellesAffichees[cle].etiquette);
  }
  delete parcellesAffichees[cle];
  if (derniereParcelleTrouveeCle === cle) derniereParcelleTrouveeCle = null; // évite de référencer une parcelle disparue
  rafraichirListeParcellesUI();
}

/* ================================================================
   5bis. MODALE DE CRÉATION / ÉDITION (Nom + Cépage) — remplace les prompt()
   ================================================================ */
function ouvrirModaleParcelle(titre, nom, cepage){
  document.getElementById('modale-titre').textContent = titre;
  document.getElementById('modale-nom').value = nom || '';
  document.getElementById('modale-cepage').value = cepage || '';
  document.getElementById('modale-parcelle').classList.add('visible');
  document.getElementById('modale-nom').focus();
}

function fermerModaleParcelle(){
  document.getElementById('modale-parcelle').classList.remove('visible');
  modeCreationParcelle = false;
  cleParcelleEnEdition = null;
  geojsonEnCours = null;
}

document.getElementById('modale-annuler').addEventListener('click', () => {
  // Si on annule une création, le polygone temporaire a déjà été retiré de la carte (cf. pm:create) :
  // il n'y a donc rien à nettoyer en plus de l'état de la modale.
  fermerModaleParcelle();
});

document.getElementById('modale-confirmer').addEventListener('click', () => {
  const nom = document.getElementById('modale-nom').value.trim();
  const cepage = document.getElementById('modale-cepage').value.trim();

  if (!nom){
    window.alert('Le nom de la parcelle est obligatoire.');
    return;
  }

  if (modeCreationParcelle){
    if (!geojsonEnCours) { fermerModaleParcelle(); return; }
    const surfaceM2 = turf.area(geojsonEnCours);
    const surfaceHa = +(surfaceM2 / 10000).toFixed(2); // 1 Ha = 10 000 m²
    const parcelle = { nom, cepage, geojson: geojsonEnCours.geometry, surfaceHa };

    if (firebaseActif){
      const reference = dbParcelles.push();
      reference.set(parcelle).catch(erreur => console.error('Échec de l\'enregistrement de la parcelle :', erreur));
    } else {
      // Pas de Firebase configuré pour l'instant : on affiche quand même la parcelle localement
      ajouterOuMajParcelle('local-' + Date.now(), parcelle);
    }

  } else if (cleParcelleEnEdition){
    if (firebaseActif && !cleParcelleEnEdition.startsWith('local-')){
      dbParcelles.child(cleParcelleEnEdition).update({ nom, cepage })
        .catch(erreur => console.error('Échec de la mise à jour de la parcelle :', erreur));
    } else if (parcellesAffichees[cleParcelleEnEdition]){
      // Pas de Firebase (ou parcelle purement locale) : on met à jour l'état local nous-mêmes
      parcellesAffichees[cleParcelleEnEdition].data.nom = nom;
      parcellesAffichees[cleParcelleEnEdition].data.cepage = cepage;
      mettreAJourEtiquetteParcelle(cleParcelleEnEdition);
      rafraichirListeParcellesUI();
    }
  }

  fermerModaleParcelle();
});

/* ================================================================
   5ter. ÉTIQUETTES DYNAMIQUES — Nom | Cépage | Surface | % (mises à jour en direct)
   ================================================================ */
// Met à jour le TEXTE d'une étiquette déjà posée sur la carte, sans recréer le polygone ni le tooltip.
function mettreAJourEtiquetteParcelle(cle){
  const parcelle = parcellesAffichees[cle];
  if (!parcelle || !parcelle.etiquette) return;

  const pct = Math.round(parcelle.pourcentage || 0);
  const texte = `${echapperHTML(parcelle.data.nom)} | ${echapperHTML(parcelle.data.cepage || '—')} | `
              + `${parcelle.data.surfaceHa.toFixed(2)} Ha | ${pct}%`;
  parcelle.etiquette.setContent(texte);
}

// Rafraîchit toutes les étiquettes en une fois (appelée à chaque recalcul global des pourcentages)
function mettreAJourEtiquettesParcelles(){
  Object.keys(parcellesAffichees).forEach(mettreAJourEtiquetteParcelle);
}

// Outils de dessin Geoman : uniquement côté Chauffeur (la Cave est strictement en lecture)
if (!etat.modeCave){
  carte.pm.addControls({
    position:'topleft',
    drawMarker:false, drawCircleMarker:false, drawPolyline:false,
    drawRectangle:false, drawCircle:false, drawText:false,
    drawPolygon:true, editMode:true, dragMode:false,
    cutPolygon:false, removalMode:true, rotateMode:false
  });

  carte.on('pm:create', (evenement) => {
    if (evenement.shape !== 'Polygon') return;
    const calqueTemporaire = evenement.layer;

    geojsonEnCours = calqueTemporaire.toGeoJSON();
    carte.removeLayer(calqueTemporaire); // remplacée par le rendu standard (contour jaune) dès la confirmation

    modeCreationParcelle = true;
    cleParcelleEnEdition = null;
    ouvrirModaleParcelle('Nouvelle parcelle', '', '');
  });
}

/* ================================================================
   6. POURCENTAGE RÉCOLTÉ PAR PARCELLE (turf.intersect / turf.union)
   ================================================================ */
function recalculerPourcentageParcelle(cle){
  const parcelle = parcellesAffichees[cle];
  if (!parcelle) return;

  let pourcentage = 0;
  if (etat.zoneRecolteTotale){
    try{
      const featureParcelle = parcelle.featureTurf || turf.feature(parcelle.data.geojson);
      const intersection = turf.intersect(featureParcelle, etat.zoneRecolteTotale);
      if (intersection){
        const aireParcelle = turf.area(featureParcelle);
        const aireIntersection = turf.area(intersection);
        pourcentage = aireParcelle > 0 ? Math.min(100, (aireIntersection / aireParcelle) * 100) : 0;
      }
    }catch(erreur){
      console.error('Calcul du pourcentage récolté impossible pour "' + parcelle.data.nom + '" :', erreur);
    }
  }
  parcelle.pourcentage = pourcentage;
  rafraichirListeParcellesUI();
}

function recalculerToutesParcelles(){
  Object.keys(parcellesAffichees).forEach(recalculerPourcentageParcelle);
  mettreAJourEtiquettesParcelles(); // synchronise le texte affiché sur la carte (sans recréer les polygones)
}

/* ================================================================
   6bis. EFFACEMENT CIBLÉ DE LA PEINTURE, PAR PARCELLE (turf.intersect / turf.difference)
   ================================================================ */
// Reconstruit etat.zoneRecolteTotale à partir de TOUS les tracés actuellement connus (tracesParClé).
// Plus coûteux qu'une simple union incrémentale : on ne l'appelle donc que sur des événements rares
// (modification/suppression d'un tracé), jamais dans la boucle GPS à 10 Hz.
function reconstruireZoneRecolteTotale(){
  let zone = null;
  for (const cle of Object.keys(tracesParClé)){
    zone = zone ? turf.union(zone, tracesParClé[cle].feature) : tracesParClé[cle].feature;
  }
  etat.zoneRecolteTotale = zone;
}

// Efface uniquement la portion de peinture contenue dans la parcelle "cleParcelle".
// Parcourt l'historique des tracés (tracesParClé) et, pour chacun touchant la parcelle,
// le découpe avec turf.difference (= "ce tracé moins la parcelle"). Un tracé entièrement
// contenu dans la parcelle est supprimé ; un tracé qui ne fait que la traverser est raccourci.
function effacerPeintureParcelle(cleParcelle){
  if (etat.modeCave) return; // la Cave ne déclenche jamais d'effacement (lecture seule)

  const parcelle = parcellesAffichees[cleParcelle];
  if (!parcelle || !parcelle.featureTurf) return;

  const confirmation = window.confirm('Êtes-vous sûr de vouloir effacer toute la peinture de cette parcelle ?');
  if (!confirmation) return;

  const parcelleFeature = parcelle.featureTurf;
  const styleTrace = { color:'#0054A6', weight:0, fillColor:'#0054A6', fillOpacity:0.55, fillRule:'nonzero' };

  Object.keys(tracesParClé).forEach(cle => {
    const trace = tracesParClé[cle];
    let nouvelleGeometrie;

    try{
      if (!turf.intersect(trace.feature, parcelleFeature)) return; // ce tracé ne touche pas la parcelle : on ne le touche pas
      nouvelleGeometrie = turf.difference(trace.feature, parcelleFeature); // portion du tracé restant HORS parcelle
    }catch(erreur){
      console.error('Découpe impossible pour le tracé ' + cle + ', il est conservé tel quel :', erreur);
      return;
    }

    if (cle.startsWith('local-')){
      // Tracé purement local (pas de Firebase) : mise à jour directe en mémoire et à l'écran
      carte.removeLayer(trace.calque);
      if (!nouvelleGeometrie){
        delete tracesParClé[cle];
      } else {
        tracesParClé[cle] = { feature: nouvelleGeometrie, calque: L.geoJSON(nouvelleGeometrie, { style: styleTrace }).addTo(carte) };
      }
    } else if (firebaseActif){
      // Tracé synchronisé : on écrit le résultat sur Firebase. C'est l'écouteur child_changed/child_removed
      // (déjà en place) qui se chargera de mettre à jour la carte et le pourcentage — ici comme à la Cave.
      if (!nouvelleGeometrie){
        dbRecolteTraces.child(cle).remove()
          .catch(erreur => console.error('Échec de la suppression du tracé ' + cle + ' :', erreur));
      } else {
        dbRecolteTraces.child(cle).update({ geojson: nouvelleGeometrie.geometry })
          .catch(erreur => console.error('Échec de la mise à jour du tracé découpé ' + cle + ' :', erreur));
      }
    }
  });

  // Sans Firebase, les écouteurs child_changed/child_removed ne se déclenchent jamais : on recalcule ici.
  if (!firebaseActif){
    reconstruireZoneRecolteTotale();
    recalculerToutesParcelles();
  }
}

/* ================================================================
   7. FONCTION PRINCIPALE — POINT D'ENTRÉE GNSS & LISSAGE
   ================================================================
   >>> En mode Chauffeur, c'est ICI que les vraies trames de l'ESP32 doivent être injectées.
   >>> En mode Cave, cette même fonction est appelée automatiquement depuis le flux Firebase.
*/
function updateGPSData(lat, lon, heading, vitesseKmh){
  heading = normaliserCap(heading);

  const vitesse = (typeof vitesseKmh === 'number')
    ? vitesseKmh
    : calculerVitesseDepuisPositions(lat, lon);

  lissage.latCible = lat;
  lissage.lonCible = lon;

  let diffCap = heading - lissage.capCible;
  if (diffCap > 180) diffCap -= 360;
  if (diffCap < -180) diffCap += 360;
  lissage.capCible = lissage.capCible + diffCap;

  ajouterPointPeinture(lat, lon, heading);
  majBandeau(heading, vitesse);
  envoyerPositionFirebase(lat, lon, heading, vitesse);

  etat.derniereLat = lat;
  etat.derniereLon = lon;
  etat.dernierCap = heading;
  etat.vitesseKmh = vitesse;
  etat.dernierePositionTemps = performance.now();
}

// === BOUCLE D'ANIMATION (60 FPS) — anime aussi bien les données locales que celles reçues de Firebase ===
function boucleAnimationFluide() {
  const k = 0.18; // Force du lissage (plus bas = plus fluide mais léger retard)

  lissage.latAffichee += (lissage.latCible - lissage.latAffichee) * k;
  lissage.lonAffichee += (lissage.lonCible - lissage.lonAffichee) * k;
  lissage.capAffiche += (lissage.capCible - lissage.capAffiche) * k;

  marqueurMachine.setLatLng([lissage.latAffichee, lissage.lonAffichee]);
  orienterIcone(normaliserCap(lissage.capAffiche));

  if (etat.suivreCamera) {
    carte.setView([lissage.latAffichee, lissage.lonAffichee], carte.getZoom(), { animate: false });
  }

  requestAnimationFrame(boucleAnimationFluide);
}

function calculerVitesseDepuisPositions(lat, lon){
  if (etat.dernierePositionTemps === null) return 0;
  const dtSecondes = (performance.now() - etat.dernierePositionTemps) / 1000;
  if (dtSecondes <= 0) return etat.vitesseKmh;

  const R = RAYON_TERRE;
  const phi1 = etat.derniereLat * Math.PI/180, phi2 = lat * Math.PI/180;
  const dPhi = (lat - etat.derniereLat) * Math.PI/180;
  const dLambda = (lon - etat.derniereLon) * Math.PI/180;
  const a = Math.sin(dPhi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dLambda/2)**2;
  const distanceM = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return (distanceM / dtSecondes) * 3.6;
}

function majBandeau(capDeg, vitesseKmh){
  document.getElementById('valeur-cap').textContent = Math.round(capDeg);
  document.getElementById('valeur-vitesse').textContent = vitesseKmh.toFixed(1);
}

function majStatutSource(){
  const puce = document.getElementById('puce-statut');
  const texte = document.getElementById('texte-statut');
  puce.className = 'puce-statut';
  switch(etat.source){
    case 'RTK_FIX':    puce.classList.add('fix');   texte.textContent = 'RTK Fix';     break;
    case 'RTK_FLOAT':  puce.classList.add('float'); texte.textContent = 'RTK Float';   break;
    case 'DECONNECTE': puce.classList.add('deco');  texte.textContent = 'Déconnecté';  break;
    default:           puce.classList.add('simu');  texte.textContent = 'Simulation';
  }
}

/* ================================================================
   8. CONNEXION TEMPS RÉEL À L'ESP32 (WebSocket) — Mode Chauffeur uniquement
   ================================================================ */
function connecterWebSocket(url){
  if (etat.modeCave) return; // la Cave ne se connecte jamais directement à l'ESP32

  try{
    websocket = new WebSocket(url);
    websocket.onopen = () => { etat.source = 'RTK_FLOAT'; majStatutSource(); arreterSimulation(); };
    websocket.onclose = () => { etat.source = 'DECONNECTE'; majStatutSource(); };
    websocket.onerror = () => { etat.source = 'DECONNECTE'; majStatutSource(); };

    websocket.onmessage = (evenement) => {
      try{
        const trame = JSON.parse(evenement.data);
        if (typeof trame.lat === 'number' && typeof trame.lon === 'number' && typeof trame.heading === 'number'){
          if (trame.fix) { etat.source = trame.fix; majStatutSource(); }
          updateGPSData(trame.lat, trame.lon, trame.heading, trame.speed);
        }
      }catch(erreur){
        console.error('Trame JSON invalide reçue de l\'ESP32 :', erreur);
      }
    };
  }catch(erreur){
    console.error('Connexion WebSocket impossible :', erreur);
    etat.source = 'DECONNECTE'; majStatutSource();
  }
}

document.getElementById('bouton-connexion').addEventListener('click', () => {
  const url = document.getElementById('champ-ws').value.trim();
  if (url) connecterWebSocket(url);
});

/* ================================================================
   9. SYNCHRONISATION TEMPS RÉEL AVEC FIREBASE
   ================================================================
   Chauffeur : ÉCRIT machine/position (continu), machine/config (au changement),
               parcelles/* (création) et recolte/traces/* (à chaque fin de tracé).
   Cave      : LIT tout ce qui précède, et ne connaît jamais l'ESP32.
*/
function envoyerPositionFirebase(lat, lon, heading, vitesse){
  if (!firebaseActif || etat.modeCave) return;
  const maintenant = performance.now();
  if (maintenant - dernierEnvoiPosition < 120) return; // ~8 envois/s : fluide à la cave, raisonnable pour la RTDB
  dernierEnvoiPosition = maintenant;

  dbMachinePosition.set({
    lat, lon, heading, vitesse,
    peinture: etat.peintureActive,
    source: etat.source,
    t: firebase.database.ServerValue.TIMESTAMP
  }).catch(erreur => console.error('Échec de l\'envoi de la position à Firebase :', erreur));
}

function envoyerConfigFirebase(){
  if (!firebaseActif || etat.modeCave) return;
  dbMachineConfig.set({
    largeurM: etat.largeurM, offsetM: etat.offsetM, cote: etat.cote
  }).catch(erreur => console.error('Échec de l\'envoi de la configuration à Firebase :', erreur));
}

if (firebaseActif){
  // --- Parcelles : tous les appareils les téléchargent et les affichent ---
  dbParcelles.on('child_added',   snap => ajouterOuMajParcelle(snap.key, snap.val()));
  dbParcelles.on('child_changed', snap => ajouterOuMajParcelle(snap.key, snap.val()));
  dbParcelles.on('child_removed', snap => supprimerParcelle(snap.key));

  // --- Configuration de la largeur/déport : la Cave doit connaître les mêmes valeurs que le tracteur ---
  dbMachineConfig.on('value', snap => {
    const d = snap.val();
    if (!d) return;
    if (typeof d.largeurM === 'number') etat.largeurM = d.largeurM;
    if (typeof d.offsetM === 'number') etat.offsetM = d.offsetM;
    if (d.cote === 'gauche' || d.cote === 'droite') etat.cote = d.cote;

    const champLargeur = document.getElementById('champ-largeur');
    const champOffset  = document.getElementById('champ-offset');
    if (champLargeur) champLargeur.value = etat.largeurM.toFixed(2);
    if (champOffset)  champOffset.value  = etat.offsetM.toFixed(2);
    document.getElementById('cote-gauche').classList.toggle('actif', etat.cote === 'gauche');
    document.getElementById('cote-droite').classList.toggle('actif', etat.cote === 'droite');
  });

  // --- Historique des tracés de peinture : permet à un appareil qui se connecte en cours de route
  //     (ou après un rechargement de page) de reconstituer toute la surface déjà récoltée.
  //     child_changed/child_removed sont indispensables à l'effacement ciblé par parcelle (cf. section 6bis) :
  //     c'est par ces deux événements que la Cave (et tous les autres appareils) voient une parcelle
  //     redevenir vierge, exactement comme le Chauffeur qui a déclenché l'effacement. ---
  const styleTraceDistante = { color:'#0054A6', weight:0, fillColor:'#0054A6', fillOpacity:0.55, fillRule:'nonzero' };

  dbRecolteTraces.on('child_added', snap => {
    if (tracesCreesLocalement.has(snap.key)){ tracesCreesLocalement.delete(snap.key); return; }
    const d = snap.val();
    if (!d || !d.geojson) return;
    try{
      const feature = turf.feature(d.geojson);
      const calque = L.geoJSON(d.geojson, { style: styleTraceDistante }).addTo(carte);
      tracesParClé[snap.key] = { feature, calque };
      etat.zoneRecolteTotale = etat.zoneRecolteTotale ? turf.union(etat.zoneRecolteTotale, feature) : feature;
      recalculerToutesParcelles();
    }catch(erreur){
      console.error('Tracé de récolte distant ignoré (géométrie invalide) :', erreur);
    }
  });

  // Un tracé existant a été MODIFIÉ (découpé par turf.difference lors d'un effacement ciblé)
  dbRecolteTraces.on('child_changed', snap => {
    if (tracesParClé[snap.key]) carte.removeLayer(tracesParClé[snap.key].calque);
    delete tracesParClé[snap.key];

    const d = snap.val();
    if (d && d.geojson){
      try{
        const feature = turf.feature(d.geojson);
        const calque = L.geoJSON(d.geojson, { style: styleTraceDistante }).addTo(carte);
        tracesParClé[snap.key] = { feature, calque };
      }catch(erreur){
        console.error('Mise à jour de tracé ignorée (géométrie invalide) :', erreur);
      }
    }
    reconstruireZoneRecolteTotale();
    recalculerToutesParcelles();
  });

  // Un tracé existant a été entièrement SUPPRIMÉ (totalement contenu dans la parcelle effacée)
  dbRecolteTraces.on('child_removed', snap => {
    if (tracesParClé[snap.key]){
      carte.removeLayer(tracesParClé[snap.key].calque);
      delete tracesParClé[snap.key];
    }
    reconstruireZoneRecolteTotale();
    recalculerToutesParcelles();
  });

  // --- Mode Cave : écoute la position/le cap/l'état de peinture de la machine en direct ---
  if (etat.modeCave){
    dbMachinePosition.on('value', snap => {
      const d = snap.val();
      if (!d || typeof d.lat !== 'number' || typeof d.lon !== 'number' || typeof d.heading !== 'number') return;

      if (d.source) { etat.source = d.source; majStatutSource(); }
      if (typeof d.peinture === 'boolean' && d.peinture !== etat.peintureActive){
        definirPeinture(d.peinture); // reconstitue le même tracé qu'au tracteur, sans jamais réécrire sur Firebase
      }
      updateGPSData(d.lat, d.lon, d.heading, d.vitesse);
    });
  }
}

/* ================================================================
   10. MODE SIMULATION (test au bureau, sans ESP32) — Mode Chauffeur uniquement
   ================================================================ */
const simulation = { actif:false, intervalle:null, vitesseKmh:5 };

function pasSimulation(){
  const distanceM = (simulation.vitesseKmh / 3.6) * 0.1;
  const destination = pointDestination(etat.derniereLat, etat.derniereLon, etat.dernierCap, distanceM);
  updateGPSData(destination.lat, destination.lon, etat.dernierCap, simulation.vitesseKmh);
}

function demarrerSimulation(){
  if (etat.modeCave || simulation.intervalle) return;
  etat.source = 'SIMULATION'; majStatutSource();
  simulation.actif = true;
  simulation.intervalle = setInterval(pasSimulation, 100);
  document.getElementById('sim-marche').classList.add('actif');
}

function arreterSimulation(){
  clearInterval(simulation.intervalle);
  simulation.intervalle = null;
  simulation.actif = false;
  const boutonMarche = document.getElementById('sim-marche');
  if (boutonMarche) boutonMarche.classList.remove('actif');
}

document.getElementById('sim-marche').addEventListener('click', () => {
  simulation.actif ? arreterSimulation() : demarrerSimulation();
});
document.getElementById('sim-gauche').addEventListener('click', () => {
  etat.dernierCap = normaliserCap(etat.dernierCap - 8);
  updateGPSData(etat.derniereLat, etat.derniereLon, etat.dernierCap, etat.vitesseKmh);
});
document.getElementById('sim-droite').addEventListener('click', () => {
  etat.dernierCap = normaliserCap(etat.dernierCap + 8);
  updateGPSData(etat.derniereLat, etat.derniereLon, etat.dernierCap, etat.vitesseKmh);
});
document.getElementById('sim-avance').addEventListener('click', () => {
  const destination = pointDestination(etat.derniereLat, etat.derniereLon, etat.dernierCap, 1);
  updateGPSData(destination.lat, destination.lon, etat.dernierCap, 0);
});

/* ================================================================
   11. PANNEAUX LATÉRAUX — ⚙️ Réglages ET 🗺️ Parcelles (un seul ouvert à la fois)
   ================================================================ */
const panneauParametres = document.getElementById('panneau-parametres');
const panneauParcelles  = document.getElementById('panneau-parcelles');
const voile = document.getElementById('voile');

function ouvrirPanneau(panneau){
  // Ferme l'autre tiroir s'il était ouvert : les deux glissent du même côté, ils ne doivent jamais se superposer
  [panneauParametres, panneauParcelles].forEach(p => { if (p !== panneau) p.classList.remove('ouvert'); });
  panneau.classList.add('ouvert');
  voile.classList.add('visible');
}
function fermerPanneaux(){
  panneauParametres.classList.remove('ouvert');
  panneauParcelles.classList.remove('ouvert');
  voile.classList.remove('visible');
}

document.getElementById('bouton-panneau').addEventListener('click', () => ouvrirPanneau(panneauParametres));
document.getElementById('bouton-panneau-parcelles').addEventListener('click', () => ouvrirPanneau(panneauParcelles));
voile.addEventListener('click', fermerPanneaux);

document.getElementById('champ-largeur').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  if (!isNaN(v) && v > 0){ etat.largeurM = v; envoyerConfigFirebase(); }
});
document.getElementById('champ-offset').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  if (!isNaN(v) && v >= 0){ etat.offsetM = v; envoyerConfigFirebase(); }
});

function selectionnerCote(cote){
  etat.cote = cote;
  document.getElementById('cote-gauche').classList.toggle('actif', cote === 'gauche');
  document.getElementById('cote-droite').classList.toggle('actif', cote === 'droite');
  envoyerConfigFirebase();
}
document.getElementById('cote-gauche').addEventListener('click', () => selectionnerCote('gauche'));
document.getElementById('cote-droite').addEventListener('click', () => selectionnerCote('droite'));

function selectionnerSuivi(actif){
  etat.suivreCamera = actif;
  document.getElementById('suivi-on').classList.toggle('actif', actif);
  document.getElementById('suivi-off').classList.toggle('actif', !actif);
}
document.getElementById('suivi-on').addEventListener('click', () => selectionnerSuivi(true));
document.getElementById('suivi-off').addEventListener('click', () => selectionnerSuivi(false));

/* ================================================================
   12. INITIALISATION
   ================================================================ */
document.body.classList.toggle('mode-cave', etat.modeCave);
document.getElementById('texte-mode').textContent = etat.modeCave ? '🍷 Cave' : '🚜 Chauffeur';

majStatutSource();
majBandeau(etat.dernierCap, etat.vitesseKmh);
orienterIcone(etat.dernierCap);
rafraichirListeParcellesUI();

// La boucle de lissage tourne toujours : elle anime aussi bien la simulation locale
// que les positions reçues de Firebase côté Cave.
requestAnimationFrame(boucleAnimationFluide);

if (!etat.modeCave){
  envoyerConfigFirebase(); // initialise machine/config pour que la Cave parte avec les bonnes valeurs
  demarrerSimulation();    // pour tester immédiatement à l'ouverture du fichier ; à retirer en production
}
